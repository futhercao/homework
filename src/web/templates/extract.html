{% extends "base.html" %}
{% block title %}信息抽取{% endblock %}
{% block content %}

<div class="card">
  <div class="card-header">
    <h2>📋 灾害事件信息抽取</h2>
    <span class="badge">Regex + NER + Event Builder</span>
  </div>
  <p style="color:var(--text-secondary);margin-bottom:16px;">
    从真实灾害新闻中自动提取 <strong>7个信息点</strong>（类型/时间/地点/伤亡/损失/响应/救援），
    组装为结构化事件。支持 <strong>批量抽取 + 知识图谱构建</strong>。
  </p>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <input type="text" id="docIdInput" placeholder="输入文档ID (如 dis_0189a585c166)"
           style="flex:1;min-width:260px;padding:11px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:var(--font);">
    <button class="btn btn-primary" onclick="extractOne()">🔬 单篇抽取</button>
    <button class="btn btn-outline" onclick="extractBatch()">📊 批量抽取 + 知识图谱</button>
  </div>
</div>

<div id="extractionResult"></div>

<div class="card">
  <div class="card-header"><h2>📄 灾害新闻列表</h2><span class="badge" id="disasterCount">—</span></div>
  <p style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;">点击任意文档即可快速测试抽取效果：</p>
  <div id="sampleDocs" style="max-height:500px;overflow-y:auto;"></div>
</div>

{% endblock %}

{% block scripts %}
<script>
async function loadSamples() {
  let resp=await fetch('/api/documents?per_page=200');
  let data=await resp.json();
  if(!data.docs) return;
  let disasterDocs=data.docs.filter(d=>{
    return ['地震','台风','洪水','暴雨','滑坡','泥石流','火灾','干旱','暴雪'].some(kw=>(d.title||'').includes(kw));
  });
  document.getElementById('disasterCount').textContent=`${disasterDocs.length}篇`;
  let html='';
  disasterDocs.slice(0,40).forEach(d=>{
    html+=`<div style="padding:8px 10px;border-bottom:1px solid var(--border);cursor:pointer;
      display:flex;align-items:center;gap:12px;transition:background .15s;border-radius:6px;"
      onmouseover="this.style.background='var(--primary-bg)'" onmouseout="this.style.background=''"
      onclick="document.getElementById('docIdInput').value='${d.id}';extractOne();window.scrollTo(0,0);">
      <code style="font-size:11px;color:var(--primary);background:var(--primary-bg);padding:2px 6px;border-radius:4px;white-space:nowrap;">${d.id.slice(0,14)}</code>
      <span style="flex:1;font-size:14px;">${d.title}</span>
      <span style="font-size:11px;color:var(--text-muted);white-space:nowrap;">${d.date||''}</span>
      <span class="tag tag-source" style="white-space:nowrap;">${d.source||''}</span>
    </div>`;
  });
  document.getElementById('sampleDocs').innerHTML=html||'<p style="color:var(--text-secondary);">暂无灾害文档</p>';
}

async function extractOne() {
  let docId=document.getElementById('docIdInput').value.trim();
  if(!docId) return alert('请先输入文档ID');
  let form=new FormData(); form.append('doc_id',docId);
  document.getElementById('extractionResult').innerHTML='<div class="card loading" style="text-align:center;padding:30px;">抽取中…</div>';
  let resp=await fetch('/api/extract',{method:'POST',body:form});
  let data=await resp.json();
  if(!data.success) return document.getElementById('extractionResult').innerHTML=`<div class="card" style="text-align:center;padding:30px;"><p style="color:var(--text-secondary);">${data.error||'抽取失败'}</p></div>`;
  renderEvent(data);
}

async function extractBatch() {
  document.getElementById('extractionResult').innerHTML='<div class="card loading" style="text-align:center;padding:30px;">批量抽取中…</div>';
  let resp=await fetch('/api/documents?per_page=500');
  let docs=(await resp.json()).docs||[];
  let disasterIds=docs.filter(d=>['地震','台风','洪水','暴雨','滑坡','泥石流','火灾','干旱'].some(kw=>(d.title||'').includes(kw))).map(d=>d.id);
  let resp2=await fetch('/api/extract/batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(disasterIds)});
  let data=await resp2.json();
  document.getElementById('extractionResult').innerHTML=`
    <div class="card" style="text-align:center;">
      <div class="card-header"><h2>✅ 批量抽取完成</h2></div>
      <div class="stats-grid" style="margin:16px 0;">
        <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-value">${data.num_events}</div><div class="stat-label">提取事件</div></div>
        <div class="stat-card"><div class="stat-icon">🔵</div><div class="stat-value">${data.kg.stats.total_nodes}</div><div class="stat-label">知识图谱节点</div></div>
        <div class="stat-card"><div class="stat-icon">🔗</div><div class="stat-value">${data.kg.stats.total_links}</div><div class="stat-label">关系边</div></div>
      </div>
      <p style="font-size:13px;color:var(--text-secondary);">知识图谱已保存至 <code>data/knowledge_graph.json</code></p>
    </div>`;
}

function renderEvent(data) {
  let e=data.event,d=e.disaster;
  let fields=[
    ['🔴 灾害类型',d.type||'—'],
    ['📅 发生时间',d.time||'—'],
    ['📍 发生地点',d.location||'—'],
    ['💀 伤亡情况',d.casualties||'—'],
    ['💰 经济损失',d.economic_loss||'—'],
    ['🚨 响应级别',d.response_level||'—'],
    ['🆘 救援信息',(d.rescue_info||[]).join('、')||'—'],
  ];
  let filled=e.filled_count, total=7;
  let completeness=Math.round(filled/total*100);
  let barColor=completeness>=80?'#059669':completeness>=50?'#d97706':'#dc2626';
  document.getElementById('extractionResult').innerHTML=`
    <div class="event-card fade-in">
      <div class="event-header">
        <h3>${d.type?`🔴 ${d.type}灾害事件`:'📋 信息抽取结果'}</h3>
        <span class="severity severity-${e.severity}">${e.severity}</span>
      </div>
      <div class="stats-grid" style="margin-bottom:12px;">
        <div class="stat-card"><div class="stat-value">${filled}/${total}</div><div class="stat-label">信息完整度</div></div>
        <div class="stat-card"><div class="stat-value" style="color:${barColor};font-size:24px;">${completeness}%</div><div class="stat-label">完整率</div></div>
        <div class="stat-card"><div class="stat-value">${e.missing_fields.length}</div><div class="stat-label">缺失字段</div></div>
      </div>
      <div class="event-grid">
        ${fields.map(([label,value])=>`
          <div class="event-field"><span class="event-field-label">${label}:</span>
            <span class="event-field-value${value==='—'?' empty':''}">${value}</span></div>`).join('')}
      </div>
      <p style="margin-top:10px;font-size:13px;color:var(--text-secondary);line-height:1.7;">📝 <em>${e.summary}</em></p>
      ${e.missing_fields.length>0?`<p style="margin-top:6px;font-size:11px;color:var(--text-muted);">⚠ 缺失: ${e.missing_fields.map(f=>f.replace('event_','')).join(', ')}</p>`:''}
    </div>
    <div class="card">
      <div class="card-header"><h3>📰 原始文档</h3></div>
      <p style="font-size:14px;"><strong>标题:</strong> ${data.event.title}</p>
      <p style="font-size:13px;color:var(--text-secondary);">${data.event.date||''} | ${data.event.url||''}</p>
    </div>`;
}

document.addEventListener('DOMContentLoaded',loadSamples);
</script>
{% endblock %}
