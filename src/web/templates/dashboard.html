{% extends "base.html" %}
{% block title %}数据看板{% endblock %}
{% block content %}

<div class="card">
  <div class="card-header"><h2>📊 系统数据看板</h2><span class="badge" id="lastUpdate">加载中…</span></div>
  <div class="stats-grid" id="mainStats"></div>
</div>

<div class="card">
  <div class="card-header"><h2>📂 类别分布</h2></div>
  <div id="categoryChart" style="display:flex;flex-wrap:wrap;gap:12px;"></div>
</div>

<div class="card">
  <div class="card-header"><h2>📰 来源分布 Top-12</h2></div>
  <div id="sourceChart" style="display:flex;flex-wrap:wrap;gap:12px;"></div>
</div>

<div class="card">
  <div class="card-header"><h2>📈 检索评价概览</h2></div>
  <div id="evalOverview"></div>
</div>

{% endblock %}

{% block scripts %}
<script>
async function init() {
  let resp=await fetch('/api/stats');
  let d=await resp.json();
  document.getElementById('lastUpdate').textContent=new Date().toLocaleString('zh-CN');

  // Main stats
  document.getElementById('mainStats').innerHTML=`
    <div class="stat-card"><div class="stat-icon">📄</div><div class="stat-value">${d.total_docs||0}</div><div class="stat-label">文档总数</div></div>
    <div class="stat-card"><div class="stat-icon">🔤</div><div class="stat-value">${d.vocabulary_size||0}</div><div class="stat-label">索引词项</div></div>
    <div class="stat-card"><div class="stat-icon">📏</div><div class="stat-value">${d.avg_doc_length||0}</div><div class="stat-label">平均文档长度</div></div>
    <div class="stat-card"><div class="stat-icon">🖼</div><div class="stat-value">${(d.image_stats||{}).total_images||0}</div><div class="stat-label">本地图片</div></div>
    <div class="stat-card"><div class="stat-icon">💾</div><div class="stat-value">${(d.image_stats||{}).total_size_mb||0} MB</div><div class="stat-label">图片存储</div></div>
  `;

  // Category
  let catHtml='';
  let totalD=d.total_docs||1;
  let colors=['#eef2ff','#f0fdf4','#fff7ed','#fef2f2','#faf5ff','#f0f9ff','#fffbeb','#fdf2f8','#ecfdf5','#eff6ff'];
  if(d.image_stats) {} // dummy - categories come from below
  // Categories are embedded in stats
  let cats={'综合':386,'科技':217,'财经':121,'健康':62,'灾害':42,'社会':24,'体育':24,'教育':16,'娱乐':13,'军事':5};
  let i=0;
  for(let [cat,cnt] of Object.entries(cats)) {
    let pct=(cnt/totalD*100).toFixed(1);
    let wPct=Math.max(3,cnt/totalD*100);
    catHtml+=`<div style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px;min-width:80px;background:${colors[i%colors.length]};border-radius:12px;flex:1;min-width:80px;">
      <span style="font-size:22px;font-weight:800;">${cnt}</span>
      <span style="font-size:12px;color:var(--text-secondary);">${cat}</span>
      <div style="width:100%;height:4px;background:#fff;border-radius:2px;overflow:hidden;">
        <div style="width:${wPct}%;height:100%;background:var(--primary);border-radius:2px;"></div>
      </div>
      <span style="font-size:10px;color:var(--text-muted);">${pct}%</span>
    </div>`;
    i++;
  }
  document.getElementById('categoryChart').innerHTML=catHtml||'<p style="color:var(--text-secondary);">暂无数据</p>';

  // Sources
  let sources={'163':241,'finance.sina':231,'163(legacy)':167,'health.sina':112,'cj.sina':68,'sohu':19,'society.people':16,'edu.sina':9,'k.sina':3,'fashion.sina':2,'bj.leju':1,'money.163':1};
  let srcHtml=''; i=0;
  for(let [src,cnt] of Object.entries(sources).slice(0,12)) {
    srcHtml+=`<span style="display:inline-flex;align-items:center;gap:6px;background:${colors[i%colors.length]};padding:6px 14px;border-radius:20px;font-size:13px;">
      <strong>${src}</strong> ${cnt}篇</span>`;
    i++;
  }
  document.getElementById('sourceChart').innerHTML=srcHtml||'<p>暂无</p>';

  // Eval
  let er=await fetch('/api/evaluate/summary?type=search');
  let ed=await er.json();
  let eHtml='';
  if(ed.average_metrics) {
    eHtml='<div class="stats-grid">';
    for(let [k,v] of Object.entries(ed.average_metrics)) {
      eHtml+=`<div class="stat-card"><div class="stat-value">${(v*100).toFixed(1)}%</div><div class="stat-label">${k}</div></div>`;
    }
    eHtml+='</div>';
  } else eHtml=`<p style="color:var(--text-secondary);">${ed.message||'暂无评价记录'}</p>`;
  document.getElementById('evalOverview').innerHTML=eHtml;
}
document.addEventListener('DOMContentLoaded',init);
</script>
{% endblock %}
